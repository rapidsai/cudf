name: pr
on:
  push:
    branches:
      - "pull-request/[0-9]+"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  # Please keep pr-builder as the top job here
  pr-builder:
    needs:
      - check-nightly-ci
      - changed-files
      - checks
      - wheel-build-libcudf
      - wheel-build-libcudf-streaming
      - wheel-build-cudf-streaming
      - wheel-build-pylibcudf
      - wheel-build-cudf-polars
      - wheel-tests-cudf-polars
      - cudf-polars-polars-tests
      - telemetry-setup
    uses: rapidsai/shared-workflows/.github/workflows/pr-builder.yaml@main
    permissions:
      contents: read
    if: always()
    with:
      needs: ${{ toJSON(needs) }}
  telemetry-setup:
    permissions:
      id-token: write
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      OTEL_SERVICE_NAME: 'pr-cudf'
    steps:
      - name: Telemetry setup
        if: ${{ vars.TELEMETRY_ENABLED == 'true' }}
        uses: rapidsai/shared-actions/telemetry-dispatch-stash-base-env-vars@main
  check-nightly-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Get PR Info
        id: get-pr-info
        uses: nv-gha-runners/get-pr-info@090577647b8ddc4e06e809e264f7881650ecdccf # main
      - name: Check if nightly CI is passing
        uses: rapidsai/shared-actions/check_nightly_success/dispatch@main
        with:
          repo: ${{ github.repository }}
          target-branch: ${{ fromJSON(steps.get-pr-info.outputs.pr-info).base.ref }}
          max-days-without-success: 14
  changed-files:
    permissions:
      actions: read
      contents: read
      packages: read
      pull-requests: read
    needs: telemetry-setup
    uses: rapidsai/shared-workflows/.github/workflows/changed-files.yaml@main
    with:
      files_yaml: |
        build_docs:
          - '**'
          - '!**/REVIEW_GUIDELINES.md'
          - '!.coderabbit.yaml'
          - '!.clang-format'
          - '!.devcontainer/**'
          - '!.github/CODEOWNERS'
          - '!.github/ISSUE_TEMPLATE/**'
          - '!.github/PULL_REQUEST_TEMPLATE.md'
          - '!.github/copy-pr-bot.yaml'
          - '!.github/labeler.yml'
          - '!.github/ops-bot.yaml'
          - '!.github/release.yml'
          - '!.github/workflows/auto-assign.yml'
          - '!.github/workflows/issue-release-scheduled.yml'
          - '!.github/workflows/labeler.yml'
          - '!.github/workflows/pr_issue_status_automation.yml'
          - '!.github/workflows/trigger-breaking-change-alert.yaml'
          - '!.pre-commit-config.yaml'
          - '!ci/build_wheel*.sh'
          - '!ci/check_style.sh'
          - '!ci/discover_libcudf_tests.sh'
          - '!ci/release/update-version.sh'
          - '!ci/run_*.sh'
          - '!ci/test_*.sh'
          - '!ci/validate_wheel.sh'
          - '!codecov.yml'
          - '!SECURITY.md'
        test_cpp:
          - '**'
          - '!**/REVIEW_GUIDELINES.md'
          - '!.coderabbit.yaml'
