name: Trigger Breaking Change Notifications

on:
  pull_request_target:
    types:
      - closed
      - reopened
      - labeled
      - unlabeled

permissions:
  actions: read
  contents: read
  id-token: write
  packages: read
  pull-requests: read

jobs:
  trigger-notifier:
    if: contains(github.event.pull_request.labels.*.name, 'breaking')
    secrets:
      NV_SLACK_BREAKING_CHANGE_NOTIFIER_APP: ${{ secrets.NV_SLACK_BREAKING_CHANGE_NOTIFIER_APP }}
    uses: rapidsai/shared-workflows/.github/workflows/breaking-change-alert.yaml@4866bb5437e913caf5bf775f57c91abd144ed391  # main
    with:
      sender_login: ${{ github.event.sender.login }}
      sender_avatar: ${{ github.event.sender.avatar_url }}
      repo: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: "${{ github.event.pull_request.title }}"
      pr_body: "${{ github.event.pull_request.body || '_Empty PR description_' }}"
      pr_base_ref: ${{ github.event.pull_request.base.ref }}
      pr_author: ${{ github.event.pull_request.user.login }}
      event_action: ${{ github.event.action }}
      pr_merged: ${{ github.event.pull_request.merged }}
