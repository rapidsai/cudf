#
# Configures the slf4j-simple binding so NativeDepsLoader's INFO-level
# timing output renders as compact, readable lines on stderr instead of
# the default verbose format.

# Hide the calling thread name; in this single-threaded example it adds
# noise without conveying anything useful.
org.slf4j.simpleLogger.showThreadName=false

# Use the unqualified class name (e.g. "NativeDepsLoader") instead of the
# fully-qualified one ("ai.rapids.cudf.NativeDepsLoader") for brevity.
org.slf4j.simpleLogger.showShortLogName=true

# Default level for everything.
org.slf4j.simpleLogger.defaultLogLevel=warn

# Ensure NativeDepsLoader's timing output is visible whenever
# -Dai.rapids.cudf.lib-log-load-timing=true is passed.
org.slf4j.simpleLogger.log.ai.rapids.cudf.NativeDepsLoader=info
