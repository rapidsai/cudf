[build-system]
build-backend = "rapids_build_backend.build"
requires = [
    "rapids-build-backend>=0.4.0,<0.5.0",
    "setuptools>=77.0.0",
    "wheel",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project]
name = "cudf-benchmarks"
dynamic = ["version"]
description = "End-to-end workload benchmarks (TPC-H / TPC-DS) for cudf-polars and cudf.pandas"
readme = { file = "README.md", content-type = "text/markdown" }
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.11"
authors = [
    { name = "NVIDIA Corporation" },
]
dependencies = [
    "nvtx",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.optional-dependencies]
polars = [
    "cudf-polars==26.8.*,>=0.0.0a0",
    "duckdb",
    "kvikio==26.8.*,>=0.0.0a0",
    "rapidsmpf==26.8.*,>=0.0.0a0",
    "tpchgen-cli",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
pandas = [
    "cudf==26.8.*,>=0.0.0a0",
    "pandas",
    "tpchgen-cli",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
dask = [
    "rapids-dask-dependency==26.8.*,>=0.0.0a0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
ray = [
    "ray>=2.55.1",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.setuptools.dynamic]
version = {file = "cudf_benchmarks/VERSION"}

[tool.setuptools.packages.find]
include = ["cudf_benchmarks*"]

[tool.rapids-build-backend]
build-backend = "setuptools.build_meta"
commit-files = []
dependencies-file = "../../dependencies.yaml"
matrix-entry = "cuda_suffixed=true"
