[build-system]
build-backend = "rapids_build_backend.build"
requires = [
    "rapids-build-backend>=0.4.0,<0.5.0",
    "scikit-build-core[pyproject]>=0.11.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project]
name = "cudf-streaming"
dynamic = ["version"]
description = "cuDF Streaming library"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [
    { name = "NVIDIA Corporation" },
]
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "libcudf-streaming==26.8.*,>=0.0.0a0",
    "pylibcudf==26.10.*,>=0.0.0a0",
    "rapidsmpf==26.10.*,>=0.0.0a0",
    "rmm==26.10.*,>=0.0.0a0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.optional-dependencies]
test = [
    "cupy-cuda13x[ctk]>=14.0.1,!=14.1.0",
    "numpy>=2.0,<3.0",
    "pytest-cov",
    "pytest-xdist",
    "pytest<9.1.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.urls]
Homepage = "https://github.com/rapidsai/cudf"
Documentation = "https://docs.rapids.ai/api/cudf/stable/"

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["cudf_streaming"]
section-order = ["future", "standard-library", "third-party", "dask", "rapids", "first-party", "local-folder"]

[tool.ruff.lint.isort.sections]
dask = ["dask", "distributed", "dask_cuda", "streamz"]
rapids = ["rmm", "cudf", "dask_cudf", "cudf_streaming", "rapidsmpf"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "F401"]

[tool.pydistcheck]
select = [
    "distro-too-large-compressed",
]

# PyPI hard limit is 1GiB, but try to keep these as small as possible
max_allowed_size_compressed = '75M'

[tool.pytest.ini_options]
addopts = "--tb=native --strict-config --strict-markers"
empty_parameter_set_mark = "fail_at_collect"
filterwarnings = [
  "error",
]
xfail_strict = true

[tool.rapids-build-backend]
build-backend = "scikit_build_core.build"
requires-python = ">=3.11"
dependencies-file = "../../dependencies.yaml"
matrix-entry = "cuda_suffixed=true;use_cuda_wheels=true"
requires = [
    "cmake>=4.0",
    "cython>=3.2.2,<3.3.0a0",
    "libcudf-streaming==26.8.*,>=0.0.0a0",
    "librapidsmpf==26.8.*,>=0.0.0a0",
    "librmm==26.10.*,>=0.0.0a0",
    "libucxx==0.51.*,>=0.0.0a0",
    "ninja",
    "pylibcudf==26.10.*,>=0.0.0a0",
    "rapidsmpf==26.10.*,>=0.0.0a0",
    "rmm==26.10.*,>=0.0.0a0",
    "ucxx==0.51.*,>=0.0.0a0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.scikit-build]
build-dir = "build/{wheel_tag}"
cmake.build-type = "Release"
cmake.version = "CMakeLists.txt"
minimum-version = "build-system.requires"
ninja.make-fallback = false
sdist.exclude = ["*tests*"]
sdist.reproducible = true
wheel.packages = ["cudf_streaming"]
wheel.exclude = ["*.pyx", "CMakeLists.txt"]

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.regex"
input = "cudf_streaming/VERSION"
regex = "(?P<value>.*)"
